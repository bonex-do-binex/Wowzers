<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Wowzers - Home</title>
    <link rel="stylesheet" href="Bootstrap/css/bootstrap.min.css">
    <script src="redirect.js"></script>
</head>
<body>
    <style>
        @font-face {
            font-family: "CustomFont";
            src: url("./Fonts/Fontspring-DEMO-toruspro-regular.otf");
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: CustomFont, sans-serif;
            background-color: #37363b;
            color: white;
        }

        .custom-navbar {
            background-color: #2f8fcf !important;
        }

        .custom-bg {
            background-color: #4c4a53;
            max-width: 800px;
            margin: auto;
        }

        svg {
            stroke-width: 2;
        }
    </style>

    <nav class="navbar navbar-expand-lg bg-body-tertiary custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand">Wowzers</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="home.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="support.html">Support</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="Logs.html">Logs</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="account.html">Account</a>
                    </li>
                </ul>

                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-light" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <div id="error-message" class="alert alert-danger rounded-3 d-none fixed-top mx-auto mt-3" role="alert" style="max-width: 600px; z-index: 1050;">
       
    </div>

    <div class="container py-4 mt-3 rounded-3 custom-bg">
        <div class="p-3 mb-4 custom-bg">
            <div class="container-fluid py-5 custom-bg">
                <h4 class="display-5 fw-bold">Download Wowzers</h4>
                <p class="col-md-8 fs-2">
                    Idk bro text
                </p>
                <button class="btn btn-primary btn-lg">
                    <img src="imgs/download.svg" style="filter:invert(1)" class="icon me-2" icon width="20" height="20">
                    Download
                </button>
            </div>
        </div>
    </div>

    <div class="container py-4 mt-3 rounded-3 custom-bg">
        <div class="p-3 mb-4 custom-bg">
            <div class="container-fluid py-5 custom-bg">
                <h4 class="display-5 fw-bold">Update Log</h4>
                <p class="col-md-8">
                    Idk bro text, and more text, and even more text, and you guessed it, even more text, keep reading like a good boy, yes, more text, and now, no more text
                </p>
                <button class="btn btn-primary btn-lg">
                    <img src="imgs/arrow-right.svg" style="filter:invert(1)" class="icon me-2" icon width="20" height="20">
                    Read More
                </button>
            </div>
        </div>
    </div>


</body>
</html>
