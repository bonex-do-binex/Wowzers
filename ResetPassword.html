<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Wowzers - Reset Password</title>
    <link rel="stylesheet" href="Bootstrap/css/bootstrap.min.css">
    <script src="redirect.js"></script>
</head>
<body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap');

        @font-face {
            font-family: "CustomFont";
            src: url("./Fonts/Fontspring-DEMO-toruspro-regular.otf");
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: CustomFont, sans-serif;
            background-color: #37363b;
            color: white;
        }

        .email-label {
            font-family: sans-serif;
        }

        .custom-navbar {
            background-color: #2f8fcf !important;
        }

        .custom-bg {
            background-color: #4c4a53;
            max-width: 800px;
            margin: auto;
        }

        #input {
            font-family: "Nunito", CustomFont, sans-serif;
            font-weight: 700;
        }

        #description {
            font-family: "Nunito", CustomFont, sans-serif;
            font-weight: 400;
        }

        svg {
            stroke-width: 2;
        }

        .btn-google img {
            height: 20px;
            margin-right: 10px;
        }

        .btn-google:hover {
            color: black;
        }


        .remember-label {
            display: flex;
            align-items: center;
            margin-top: 8px;
            margin-bottom: 16px;
        }

        .login-form {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background-color: #4c4a53;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

            .login-form a {
                text-decoration: none;
            }

            .login-form button {
                width: 100%;
                margin-top: 8px;
            }

        .login-column {
            width: 100%;
            min-height: 100vh;
            padding-top: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #37363b;
        }

        .btn-wowzers {
            background-color: #0086ea;
            color: white;
            font-weight: 600;
        }

            .btn-wowzers:hover {
                background-color: #075c9b;
            }
    </style>

    <nav class="navbar navbar-expand-lg bg-body-tertiary custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand">Wowzers</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="home.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="support.html">Support</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="Logs.html">Logs</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="account.html">Account</a>
                    </li>
                </ul>

                <div>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-light" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="login-column">
        <div class="login-form">
            <h3 id="Title" class="mb-4">Reset your Password</h3>

            <div class="mb-3">
                <p id="description">Please enter your email adress from the account you wanna reset the password.</p>
            </div>

            <div class="mb-3">
                <label id="labelBox" for="input" class="form-label">Email</label>
                <input type="email" id="input" placeholder="name@email.com" class="form-control" required />
                <div class="invalid-feedback">
                    Please enter a valid email.
                </div>
            </div>

            <button id="RequestBtn" class="btn btn-wowzers">Request reset code</button>

            <p class="mt-3 mb-0 text-center">
                <a href="login.html" class="link">Back to Login</a>
            </p>
        </div>
    </div>

    <script>
        const requestBtn = document.getElementById("RequestBtn");
        const input = document.getElementById("input");
        const description = document.getElementById("description");
        const labelBox = document.getElementById("labelBox");

        requestBtn.addEventListener("click", function (event) {
            event.preventDefault();
            input.classList.remove("is-invalid");
            if (input.checkValidity()) {
                description.innerHTML = "We've sent a code to your email.";
                labelBox.innerHTML = "Code";
                requestBtn.innerHTML = "Verify the code";
                input.type = "number";
                input.value = "";
                input.placeholder = "123456";
            } else {
                input.classList.add("is-invalid");
            }
        });
    </script>
</body>
</html>
